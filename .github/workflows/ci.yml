name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Lint, type-check and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.9.22"
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Type-check
        run: uv run mypy src

      - name: Run tests
        run: uv run pytest

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      # Build only (no push) so a broken Dockerfile fails CI before a release.
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: supernote-task-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
